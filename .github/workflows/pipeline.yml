name: Daily Berlin EventScout Pipeline

on:
  schedule:
    - cron: '0 2 * * *' # Roz raat 2 baje chalega
  workflow_dispatch: # GitHub par ek manual button dega

jobs:
  update-data-and-model:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run Scraper
        run: python 1_data_prep.py 
        
      - name: Update Embeddings
        run: python 2_model_sbert.py
        
      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add clean_events.csv embeddings.pkl
          git commit -m "🤖 Auto-update: Fetched new events" || echo "No changes to commit"
          git push